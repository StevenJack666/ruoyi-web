version: '3.8'

services:
  # ==================== RuoYi-AI 前端服务 ====================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ruoyi-ai-web
    restart: always
    ports:
      - "5137:5137"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      # 后端 API 地址 - 修改为你的后端实际地址
      # 如果后端在本地 Windows 上，使用宿主机 IP（如 192.168.1.100）
      # 如果后端在服务器上，使用服务器 IP 或域名
      VITE_API_URL: http://127.0.0.1:6039
    networks:
      - ruoyi-net

# ==================== 网络配置 ====================
networks:
  ruoyi-net:
    driver: bridge
